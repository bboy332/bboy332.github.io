<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Pillowcase Playlist (1297 Songs)</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 20px;
            min-height: 100vh;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        /* Video Background */
        #video-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            object-fit: cover;
            filter: brightness(0.65) contrast(1.1) saturate(1.3);
        }
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 10, 15, 0.78);
            z-index: -1;
        }

        .header, .player, .favorites-header, .search, .playlist {
            position: relative;
            z-index: 2;
        }

        h1 { text-align: center; margin: 10px 0 4px; text-shadow: 0 2px 15px rgba(0,0,0,0.9); }
        .subtitle { text-align: center; color: #ccc; margin-bottom: 25px; }

        /* Player & UI styles (same as before) */
        .player {
            max-width: 720px; margin: 0 auto 30px; background: rgba(26,26,26,0.95);
            border-radius: 20px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }
        .track-title {
            font-size: 1.45em; font-weight: 600; margin: 10px 0 8px;
            display: flex; align-items: center; justify-content: center; gap: 15px;
        }
        .fav-player-btn { font-size: 1.7em; cursor: pointer; }
        .fav-player-btn.liked { color: #ff2d55; }

        .progress-container { height: 6px; background: #333; border-radius: 999px; margin: 15px 0; cursor: pointer; }
        .progress { height: 100%; background: #00ff9d; width: 0%; border-radius: 999px; }
        .time { display: flex; justify-content: space-between; font-size: 0.9em; color: #aaa; }

        .controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 20px 0; }
        button {
            background: none; border: none; color: #fff; font-size: 2.1em;
            cursor: pointer; padding: 8px; transition: all 0.2s;
        }
        button:hover { color: #00ff9d; transform: scale(1.15); }
        .shuffle-btn {
            font-size: 1.55em; padding: 10px 22px; border-radius: 30px; background: #222;
        }
        .shuffle-btn.active { background: #00ff9d; color: #000; }

        .favorites-header, .search, .playlist { max-width: 720px; margin: 0 auto; }
        .favorites-header {
            padding: 14px 20px; background: rgba(31,31,31,0.95); border-radius: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: space-between;
            font-weight: 600; margin-bottom: 10px;
        }
        .search {
            padding: 16px 20px; font-size: 17px; background: #1f1f1f;
            border: none; border-radius: 12px; color: #fff; margin-bottom: 20px;
        }
        .song-btn {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; padding: 16px 20px; margin: 6px 0;
            background: #1f1f1f; border: none; border-radius: 12px;
            color: #ddd; font-size: 15.5px; cursor: pointer; transition: all 0.2s;
        }
        .song-btn:hover { background: #2a2a2a; transform: translateX(6px); }
        .song-btn.playing { background: #00ff9d; color: #000; font-weight: 600; }
        .heart { font-size: 1.45em; transition: all 0.2s; }
        .heart.liked { color: #ff2d55; }
    </style>
</head>
<body>
    <!-- Uzi Video Background -->
    <iframe id="video-bg" 
            src="https://www.youtube.com/embed/d3rpxWI00w4?autoplay=1&loop=1&playlist=d3rpxWI00w4&controls=0&mute=1&modestbranding=1&showinfo=0&rel=0"
            frameborder="0" allow="autoplay"></iframe>
    <div class="overlay"></div>

    <div class="header">
        <h1>My Pillowcase Playlist</h1>
        <div class="subtitle">1297 songs • Random start</div>
    </div>

    <div class="player">
        <div class="track-title" id="current-title">
            Loading...
            <span id="fav-player-heart" class="fav-player-btn" onclick="toggleCurrentFavorite()">♡</span>
        </div>
        <div class="progress-container" id="progress-container"><div class="progress" id="progress"></div></div>
        <div class="time">
            <span id="current-time">0:00</span>
            <span id="duration">0:00</span>
        </div>

        <div class="controls">
            <button id="shuffle-btn" class="shuffle-btn">🔀 Shuffle</button>
            <button id="prev-btn">⫻</button>
            <button id="play-pause-btn">▶</button>
            <button id="next-btn">⫻</button>
        </div>

        <div style="text-align:center; margin-top:10px;">
            <input type="range" id="volume" min="0" max="1" step="0.01" value="0.85" style="width:260px;">
        </div>
    </div>

    <div class="favorites-header" onclick="toggleFavorites()">
        ❤️ Favorites (<span id="fav-count">0</span>)
        <span id="fav-arrow">▼</span>
    </div>
    <div id="favorites-list" class="playlist" style="display: none;"></div>

    <input type="text" id="search" class="search" placeholder="Search all songs..." onkeyup="filterSongs()">

    <div class="playlist" id="playlist"></div>

    <script>
        // (All your previous working JavaScript - favorites, controls, etc.)
        let songs = [];
        let currentIndex = 0;
        let audio = new Audio();
        let filteredSongs = [];
        let favorites = JSON.parse(localStorage.getItem('pillowFavorites') || '[]');

        fetch('tracks.txt')
            .then(res => res.text())
            .then(text => {
                songs = text.trim().split('\n').filter(url => url.trim().startsWith('http'));
                filteredSongs = [...songs];
                currentIndex = Math.floor(Math.random() * songs.length);
                renderAll();
                playCurrent();
            });

        function saveFavorites() {
            localStorage.setItem('pillowFavorites', JSON.stringify(favorites));
            document.getElementById('fav-count').textContent = favorites.length;
        }

        function isFavorited(idx) { return favorites.includes(idx); }

        function toggleFavorite(idx) {
            if (isFavorited(idx)) favorites = favorites.filter(i => i !== idx);
            else favorites.push(idx);
            saveFavorites();
            renderAll();
            updatePlayerHeart();
        }

        function toggleCurrentFavorite() { toggleFavorite(currentIndex); }

        function updatePlayerHeart() {
            const heart = document.getElementById('fav-player-heart');
            heart.textContent = isFavorited(currentIndex) ? '❤️' : '♡';
            heart.classList.toggle('liked', isFavorited(currentIndex));
        }

        function toggleFavorites() {
            const list = document.getElementById('favorites-list');
            list.style.display = list.style.display === 'none' ? 'block' : 'none';
            document.getElementById('fav-arrow').textContent = list.style.display === 'none' ? '▼' : '▲';
        }

        function renderFavorites() { /* same as before */ }
        function renderPlaylist() { /* same as before */ }
        function renderAll() { renderFavorites(); renderPlaylist(); updatePlayerHeart(); }
        function filterSongs() { /* same as before */ }

        function playCurrent() {
            audio.src = songs[currentIndex];
            audio.play().catch(() => {});
            document.getElementById('play-pause-btn').innerHTML = '❚❚';
            document.getElementById('current-title').innerHTML = `Track ${String(currentIndex+1).padStart(4,'0')} 
                <span id="fav-player-heart" class="fav-player-btn" onclick="toggleCurrentFavorite()">♡</span>`;
            renderAll();
        }

        // Controls, progress, etc. (same as last stable version)
        document.getElementById('play-pause-btn').onclick = () => {
            if (audio.paused) { audio.play(); document.getElementById('play-pause-btn').innerHTML = '❚❚'; }
            else { audio.pause(); document.getElementById('play-pause-btn').innerHTML = '▶'; }
        };

        document.getElementById('next-btn').onclick = () => { currentIndex = (currentIndex + 1) % songs.length; playCurrent(); };
        document.getElementById('prev-btn').onclick = () => { currentIndex = (currentIndex - 1 + songs.length) % songs.length; playCurrent(); };

        document.getElementById('shuffle-btn').onclick = () => {
            const btn = document.getElementById('shuffle-btn');
            btn.classList.toggle('active');
            if (btn.classList.contains('active')) {
                songs = songs.sort(() => Math.random() - 0.5);
                currentIndex = 0;
                playCurrent();
            }
        };

        document.getElementById('volume').oninput = (e) => audio.volume = parseFloat(e.target.value);

        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress');

        audio.ontimeupdate = () => {
            if (audio.duration) {
                progressBar.style.width = (audio.currentTime / audio.duration * 100) + '%';
                document.getElementById('current-time').textContent = formatTime(audio.currentTime);
                document.getElementById('duration').textContent = formatTime(audio.duration);
            }
        };

        progressContainer.onclick = (e) => {
            const rect = progressContainer.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        };

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        audio.onended = () => document.getElementById('next-btn').click();
    </script>
</body>
</html>
