<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Music Playlist</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #111; color: #fff; padding: 20px; text-align: center; }
        button { padding: 12px 20px; margin: 8px; font-size: 16px; cursor: pointer; }
        .now-playing { margin: 20px; font-size: 18px; min-height: 28px; }
    </style>
</head>
<body>
    <h1>My Pillowcase Music Collection</h1>
    <div id="nowPlaying" class="now-playing">Click a song to play</div>

    <!-- Add your songs here from the spreadsheet -->
    <button onclick="playSong('https://pillows.su/f/9281f17a3b740f3843fefdd75ec1d554', 'Lambo - Akachi Ruff')">▶ Lambo (Akachi) Ruff</button>
    
    <!-- Example of more buttons -->
    <!-- <button onclick="playSong('OTHER_PILLOWS_LINK_HERE', 'Song Title')">▶ Song Title</button> -->

    <script>
        let currentSound = null;

        function playSong(url, title) {
            // Stop previous song
            if (currentSound) currentSound.stop();

            document.getElementById('nowPlaying').textContent = `Now Playing: ${title}`;

            currentSound = new Howl({
                src: [url],
                html5: true,           // Important for streaming large files
                autoplay: true,
                volume: 0.9,
                onloaderror: () => {
                    alert("Could not load this song (CORS issue). Try another one.");
                }
            });
        }
    </script>
</body>
</html>
