<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pillowcase Music Player</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 40px;
}
button {
    padding: 10px 20px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
}
audio {
    width: 80%;
    margin-top: 20px;
}
</style>
</head>

<body>

<h2 id="trackInfo">Loading...</h2>
<audio id="player" controls></audio>
<br><br>

<button onclick="prevTrack()">Previous</button>
<button onclick="nextTrack()">Next</button>
<button onclick="toggleShuffle()">Shuffle: OFF</button>

<script>

let tracks = [];
let currentIndex = 0;
let shuffle = false;
let player = document.getElementById("player");

//////////////////////////////////////////////////
// LOAD TRACK LIST
//////////////////////////////////////////////////

fetch("tracks.txt")
  .then(res => res.text())
  .then(text => {
    tracks = text.split("\n").filter(t => t.trim() !== "");
    loadTrack(0);
  });

//////////////////////////////////////////////////
// URL STRATEGY (KEY PART)
//////////////////////////////////////////////////

function getVariants(url) {
    let id = url.split("/").pop();

    return [
        `https://api.pillows.su/api/download/${id}`, // original
        `https://pillows.su/api/file/${id}`,         // possible stream
        `https://pillows.su/f/${id}?download=false`, // inline attempt
    ];
}

//////////////////////////////////////////////////
// LOAD TRACK WITH FALLBACKS
//////////////////////////////////////////////////

async function loadTrack(index) {
    if (!tracks.length) return;

    currentIndex = index;
    let original = tracks[index];
    let variants = getVariants(original);

    document.getElementById("trackInfo").innerText =
        `Loading track ${index + 1} / ${tracks.length}...`;

    for (let url of variants) {
        let success = await tryPlay(url);
        if (success) {
            document.getElementById("trackInfo").innerText =
                `Track ${index + 1} / ${tracks.length}`;
            preloadNext();
            return;
        }
    }

    console.log("Skipping broken track:", original);
    nextTrack(); // skip if ALL fail
}

//////////////////////////////////////////////////
// TRY PLAY METHOD
//////////////////////////////////////////////////

function tryPlay(url) {
    return new Promise(resolve => {

        let timeout = setTimeout(() => {
            resolve(false);
        }, 4000);

        player.src = url;
        player.load();

        player.oncanplay = () => {
            clearTimeout(timeout);
            resolve(true);
        };

        player.onerror = async () => {
            clearTimeout(timeout);

            // fallback: try fetch blob
            try {
                let res = await fetch(url);
                let blob = await res.blob();
                let blobUrl = URL.createObjectURL(blob);

                player.src = blobUrl;
                resolve(true);
            } catch {
                resolve(false);
            }
        };
    });
}

//////////////////////////////////////////////////
// PRELOAD NEXT TRACK
//////////////////////////////////////////////////

function preloadNext() {
    let nextIndex = (currentIndex + 1) % tracks.length;
    let id = tracks[nextIndex].split("/").pop();

    let link = document.createElement("link");
    link.rel = "preload";
    link.as = "audio";
    link.href = `https://api.pillows.su/api/download/${id}`;
    document.head.appendChild(link);
}

//////////////////////////////////////////////////
// CONTROLS
//////////////////////////////////////////////////

function nextTrack() {
    if (shuffle) {
        currentIndex = Math.floor(Math.random() * tracks.length);
    } else {
        currentIndex = (currentIndex + 1) % tracks.length;
    }
    loadTrack(currentIndex);
}

function prevTrack() {
    currentIndex = (currentIndex - 1 + tracks.length) % tracks.length;
    loadTrack(currentIndex);
}

function toggleShuffle() {
    shuffle = !shuffle;
    document.querySelector("button[onclick='toggleShuffle()']").innerText =
        "Shuffle: " + (shuffle ? "ON" : "OFF");
}

//////////////////////////////////////////////////
// AUTO NEXT
//////////////////////////////////////////////////

player.addEventListener("ended", () => {
    nextTrack();
});

</script>

</body>
</html>
