<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pillowcase Music Playlist</title>
<style>
body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 40px;
}
button {
    padding: 10px 20px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
}
audio {
    width: 80%;
    margin-top: 20px;
}
</style>
</head>
<body>

<h2 id="trackInfo">Loading...</h2>
<audio id="player" controls></audio>
<br><br>

<button onclick="prevTrack()">Previous</button>
<button onclick="nextTrack()">Next</button>
<button onclick="toggleShuffle()">Shuffle: OFF</button>

<script>

let rawTracks = "";
let tracks = [];
let currentIndex = 0;
let shuffle = false;

fetch("tracks.txt")
  .then(res => res.text())
  .then(text => {
    rawTracks = text;
    tracks = rawTracks.split("\n").filter(t => t.trim() !== "");
    loadTrack(0);
  });

function loadTrack(index) {
    if (tracks.length === 0) return;
    currentIndex = index;
    document.getElementById("player").src = tracks[index];
    document.getElementById("trackInfo").innerText = "Track " + (index + 1) + " / " + tracks.length;
}

function nextTrack() {
    if (shuffle) {
        currentIndex = Math.floor(Math.random() * tracks.length);
    } else {
        currentIndex = (currentIndex + 1) % tracks.length;
    }
    loadTrack(currentIndex);
}

function prevTrack() {
    currentIndex = (currentIndex - 1 + tracks.length) % tracks.length;
    loadTrack(currentIndex);
}

function toggleShuffle() {
    shuffle = !shuffle;
    document.querySelector("button[onclick='toggleShuffle()']").innerText = "Shuffle: " + (shuffle ? "ON" : "OFF");
}

</script>

</body>
</html>
