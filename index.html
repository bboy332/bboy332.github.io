<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Pillowcase Playlist (1297 Songs)</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .uzi-banner {
            width: 100%; max-width: 720px; height: 180px; object-fit: cover;
            border-radius: 16px; margin: 0 auto 15px; display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { margin: 10px 0 4px; }
        .subtitle { color: #aaa; }

        .player {
            max-width: 720px; margin: 0 auto 30px; background: #1a1a1a;
            border-radius: 20px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            position: relative;
        }
        .now-playing {
            text-align: center;
        }
        .track-title {
            font-size: 1.4em; font-weight: 600; margin: 10px 0 8px; display: flex;
            align-items: center; justify-content: center; gap: 12px;
        }
        .fav-player-btn {
            font-size: 1.6em; cursor: pointer; transition: all 0.2s;
        }
        .fav-player-btn.liked { color: #ff2d55; }
        .progress-container { height: 6px; background: #333; border-radius: 999px; margin: 15px 0; cursor: pointer; }
        .progress { height: 100%; background: #00ff9d; width: 0%; border-radius: 999px; }
        .time { display: flex; justify-content: space-between; font-size: 0.9em; color: #888; }

        .controls {
            display: flex; align-items: center; justify-content: center; gap: 20px; margin: 20px 0;
        }
        button {
            background: none; border: none; color: #fff; font-size: 2.1em;
            cursor: pointer; padding: 8px; transition: all 0.2s;
        }
        button:hover { color: #00ff9d; transform: scale(1.15); }
        .shuffle-btn {
            font-size: 1.55em; padding: 10px 22px; border-radius: 30px; background: #222;
        }
        .shuffle-btn.active { background: #00ff9d; color: #000; }

        .favorites-header {
            max-width: 720px; margin: 0 auto 10px; padding: 12px 20px;
            background: #1f1f1f; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
            font-weight: 600;
        }
        .search {
            width: 100%; max-width: 720px; margin: 0 auto 20px; padding: 16px 20px;
            font-size: 17px; background: #1f1f1f; border: none; border-radius: 12px; color: #fff;
        }
        .playlist { max-width: 720px; margin: 0 auto; }
        .song-btn {
            display: flex; align-items: center; justify-content: space-between;
            width: 100%; padding: 16px 20px; margin: 6px 0;
            background: #1f1f1f; border: none; border-radius: 12px;
            color: #ddd; font-size: 15.5px; cursor: pointer; transition: all 0.2s;
        }
        .song-btn:hover { background: #2a2a2a; transform: translateX(6px); }
        .song-btn.playing { background: #00ff9d; color: #000; font-weight: 600; }
        .heart { font-size: 1.4em; transition: all 0.2s; }
        .heart.liked { color: #ff2d55; }
    </style>
</head>
<body>
    <div class="header">
        <img id="uzi-banner" class="uzi-banner" src="https://picsum.photos/id/1015/800/200" alt="Lil Uzi Vert">
        <h1>My Pillowcase Playlist</h1>
        <div class="subtitle">1297 songs • Random start</div>
    </div>

    <div class="player">
        <div class="now-playing">
            <div class="track-title" id="current-title">
                Loading...
                <span id="fav-player-heart" class="fav-player-btn" onclick="toggleCurrentFavorite()">♡</span>
            </div>
            <div class="progress-container" id="progress-container"><div class="progress" id="progress"></div></div>
            <div class="time">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button id="shuffle-btn" class="shuffle-btn">🔀 Shuffle</button>
            <button id="prev-btn">⫻</button>
            <button id="play-pause-btn">▶</button>
            <button id="next-btn">⫻</button>
        </div>

        <div style="text-align:center; margin-top:10px;">
            <input type="range" id="volume" min="0" max="1" step="0.01" value="0.85" style="width:260px;">
        </div>
    </div>

    <!-- Favorites Section -->
    <div class="favorites-header" onclick="toggleFavorites()">
        ❤️ Favorites (<span id="fav-count">0</span>)
        <span id="fav-arrow">▼</span>
    </div>
    <div id="favorites-list" class="playlist" style="display: none;"></div>

    <input type="text" id="search" class="search" placeholder="Search all songs..." onkeyup="filterSongs()">

    <div class="playlist" id="playlist"></div>

    <script>
        let songs = [];
        let currentIndex = 0;
        let audio = new Audio();
        let filteredSongs = [];
        let favorites = JSON.parse(localStorage.getItem('pillowFavorites') || '[]');

        const uziImages = ["https://picsum.photos/id/1015/800/200","https://picsum.photos/id/1027/800/200","https://picsum.photos/id/106/800/200","https://picsum.photos/id/201/800/200","https://picsum.photos/id/133/800/200"];

        fetch('tracks.txt')
            .then(res => res.text())
            .then(text => {
                songs = text.trim().split('\n').filter(url => url.trim().startsWith('http'));
                filteredSongs = [...songs];
                currentIndex = Math.floor(Math.random() * songs.length);
                renderAll();
                playCurrent();
                setInterval(() => {
                    document.getElementById('uzi-banner').src = uziImages[Math.floor(Math.random()*uziImages.length)];
                }, 8000);
            });

        function saveFavorites() {
            localStorage.setItem('pillowFavorites', JSON.stringify(favorites));
            document.getElementById('fav-count').textContent = favorites.length;
        }

        function isFavorited(idx) {
            return favorites.includes(idx);
        }

        function toggleFavorite(idx) {
            if (isFavorited(idx)) {
                favorites = favorites.filter(i => i !== idx);
            } else {
                favorites.push(idx);
            }
            saveFavorites();
            renderAll();
            updatePlayerHeart();
        }

        function toggleCurrentFavorite() {
            toggleFavorite(currentIndex);
        }

        function updatePlayerHeart() {
            const heart = document.getElementById('fav-player-heart');
            heart.textContent = isFavorited(currentIndex) ? '❤️' : '♡';
            heart.classList.toggle('liked', isFavorited(currentIndex));
        }

        function toggleFavorites() {
            const list = document.getElementById('favorites-list');
            const arrow = document.getElementById('fav-arrow');
            list.style.display = list.style.display === 'none' ? 'block' : 'none';
            arrow.textContent = list.style.display === 'none' ? '▼' : '▲';
        }

        function renderFavorites() {
            const container = document.getElementById('favorites-list');
            container.innerHTML = '';
            if (favorites.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#666; padding:30px 20px;">No favorites yet. Click the hearts ❤️</div>';
                return;
            }
            favorites.forEach(idx => {
                const btn = document.createElement('button');
                btn.className = 'song-btn';
                if (idx === currentIndex) btn.classList.add('playing');
                btn.innerHTML = `▶ Track ${String(idx+1).padStart(4,'0')} 
                    <span class="heart liked" onclick="event.stopImmediatePropagation(); toggleFavorite(${idx});">❤️</span>`;
                btn.onclick = () => { currentIndex = idx; playCurrent(); };
                container.appendChild(btn);
            });
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist');
            container.innerHTML = '';
            filteredSongs.forEach((url, i) => {
                const globalIndex = songs.indexOf(url);
                const btn = document.createElement('button');
                btn.className = 'song-btn';
                if (globalIndex === currentIndex) btn.classList.add('playing');
                const isFav = isFavorited(globalIndex);
                btn.innerHTML = `▶ Track ${String(globalIndex+1).padStart(4,'0')} 
                    <span class="heart ${isFav ? 'liked' : ''}" onclick="event.stopImmediatePropagation(); toggleFavorite(${globalIndex});">${isFav ? '❤️' : '♡'}</span>`;
                btn.onclick = () => { currentIndex = globalIndex; playCurrent(); };
                container.appendChild(btn);
            });
        }

        function renderAll() {
            renderFavorites();
            renderPlaylist();
            updatePlayerHeart();
        }

        function filterSongs() {
            const term = document.getElementById('search').value.toLowerCase();
            filteredSongs = songs.filter((_, i) => `track ${String(i+1).padStart(4,'0')}`.includes(term));
            renderPlaylist();
        }

        function playCurrent() {
            audio.src = songs[currentIndex];
            audio.play().catch(() => {});
            document.getElementById('play-pause-btn').innerHTML = '❚❚';
            document.getElementById('current-title').innerHTML = `Track ${String(currentIndex+1).padStart(4,'0')} 
                <span id="fav-player-heart" class="fav-player-btn" onclick="toggleCurrentFavorite()">♡</span>`;
            renderAll();
        }

        // Controls
        document.getElementById('play-pause-btn').onclick = () => {
            if (audio.paused) { audio.play(); document.getElementById('play-pause-btn').innerHTML = '❚❚'; }
            else { audio.pause(); document.getElementById('play-pause-btn').innerHTML = '▶'; }
        };

        document.getElementById('next-btn').onclick = () => { currentIndex = (currentIndex + 1) % songs.length; playCurrent(); };
        document.getElementById('prev-btn').onclick = () => { currentIndex = (currentIndex - 1 + songs.length) % songs.length; playCurrent(); };

        document.getElementById('shuffle-btn').onclick = () => {
            const btn = document.getElementById('shuffle-btn');
            btn.classList.toggle('active');
            if (btn.classList.contains('active')) {
                songs = songs.sort(() => Math.random() - 0.5);
                currentIndex = 0;
                playCurrent();
            }
        };

        document.getElementById('volume').oninput = (e) => audio.volume = parseFloat(e.target.value);

        // Progress
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress');

        audio.ontimeupdate = () => {
            if (audio.duration) {
                progressBar.style.width = (audio.currentTime / audio.duration * 100) + '%';
                document.getElementById('current-time').textContent = formatTime(audio.currentTime);
                document.getElementById('duration').textContent = formatTime(audio.duration);
            }
        };

        progressContainer.onclick = (e) => {
            const rect = progressContainer.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        };

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        audio.onended = () => document.getElementById('next-btn').click();
    </script>
</body>
</html>
