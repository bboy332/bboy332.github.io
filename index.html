<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Pillowcase Playlist (1297 Songs)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        h1 {
            text-align: center;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 20px;
        }
        .player {
            max-width: 700px;
            margin: 0 auto 30px;
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .now-playing {
            text-align: center;
            margin-bottom: 15px;
        }
        .track-title {
            font-size: 1.3em;
            font-weight: 600;
            margin: 8px 0;
        }
        .progress-container {
            height: 6px;
            background: #333;
            border-radius: 3px;
            margin: 15px 0;
            cursor: pointer;
            position: relative;
        }
        .progress {
            height: 100%;
            background: #00ff9d;
            width: 0%;
            border-radius: 3px;
        }
        .time {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: #aaa;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }
        button {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.8em;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
        }
        button:hover { color: #00ff9d; transform: scale(1.1); }
        .shuffle-btn {
            font-size: 1.4em;
            padding: 10px 16px;
            border-radius: 30px;
            background: #222;
        }
        .shuffle-btn.active {
            background: #00ff9d;
            color: #000;
        }
        .volume {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }
        input[type="range"] {
            accent-color: #00ff9d;
        }

        .search {
            width: 100%;
            max-width: 700px;
            margin: 0 auto 20px;
            padding: 14px 20px;
            font-size: 17px;
            background: #1a1a1a;
            border: none;
            border-radius: 12px;
            color: #fff;
        }

        .playlist {
            max-width: 700px;
            margin: 0 auto;
        }
        .song-btn {
            display: block;
            width: 100%;
            padding: 14px 18px;
            margin: 4px 0;
            background: #1f1f1f;
            border: none;
            border-radius: 10px;
            text-align: left;
            color: #ddd;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .song-btn:hover {
            background: #2a2a2a;
            transform: translateX(4px);
        }
        .song-btn.playing {
            background: #00ff9d;
            color: #000;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <h1>My Pillowcase Playlist</h1>
    <div class="subtitle">1297 songs • Random start</div>

    <div class="player" id="player">
        <div class="now-playing">
            <div class="track-title" id="current-title">Track 0001</div>
            <div class="progress-container" id="progress-container">
                <div class="progress" id="progress"></div>
            </div>
            <div class="time">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button id="shuffle-btn" class="shuffle-btn">🔀 Shuffle</button>
            <button id="prev-btn">⫻</button>
            <button id="play-pause-btn">▶</button>
            <button id="next-btn">⫻</button>
        </div>

        <div class="volume">
            <span>🔊</span>
            <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">
        </div>
    </div>

    <input type="text" id="search" class="search" placeholder="Search songs..." onkeyup="filterSongs()">

    <div class="playlist" id="playlist"></div>

    <script>
        let songs = [];
        let currentIndex = 0;
        let isShuffle = true;
        let audio = new Audio();
        let filteredSongs = [];

        // Load tracks from file
        fetch('tracks_clean.txt')
            .then(res => res.text())
            .then(text => {
                songs = text.trim().split('\n').filter(url => url.trim());
                filteredSongs = [...songs];
                currentIndex = Math.floor(Math.random() * songs.length);
                renderPlaylist();
                playCurrent();
            });

        function formatTitle(url) {
            return `Track ${String(songs.indexOf(url) + 1).padStart(4, '0')}`;
        }

        function playCurrent() {
            if (!songs.length) return;
            audio.src = songs[currentIndex];
            audio.play();
            document.getElementById('play-pause-btn').innerHTML = '❚❚';
            document.getElementById('current-title').textContent = formatTitle(songs[currentIndex]);
            renderPlaylist(); // highlight playing
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist');
            container.innerHTML = '';
            filteredSongs.forEach((url, i) => {
                const btn = document.createElement('button');
                btn.className = 'song-btn';
                if (songs.indexOf(url) === currentIndex) btn.classList.add('playing');
                btn.textContent = `▶ ${formatTitle(url)}`;
                btn.onclick = () => {
                    currentIndex = songs.indexOf(url);
                    playCurrent();
                };
                container.appendChild(btn);
            });
        }

        function filterSongs() {
            const term = document.getElementById('search').value.toLowerCase();
            filteredSongs = songs.filter(url => formatTitle(url).toLowerCase().includes(term));
            renderPlaylist();
        }

        // Controls
        document.getElementById('play-pause-btn').onclick = () => {
            if (audio.paused) {
                audio.play();
                document.getElementById('play-pause-btn').innerHTML = '❚❚';
            } else {
                audio.pause();
                document.getElementById('play-pause-btn').innerHTML = '▶';
            }
        };

        document.getElementById('next-btn').onclick = () => {
            currentIndex = (currentIndex + 1) % songs.length;
            playCurrent();
        };

        document.getElementById('prev-btn').onclick = () => {
            currentIndex = (currentIndex - 1 + songs.length) % songs.length;
            playCurrent();
        };

        document.getElementById('shuffle-btn').onclick = () => {
            isShuffle = !isShuffle;
            document.getElementById('shuffle-btn').classList.toggle('active', isShuffle);
        };

        document.getElementById('volume').oninput = (e) => {
            audio.volume = parseFloat(e.target.value);
        };

        // Progress
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress');

        audio.ontimeupdate = () => {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = percent + '%';
                document.getElementById('current-time').textContent = formatTime(audio.currentTime);
                document.getElementById('duration').textContent = formatTime(audio.duration);
            }
        };

        progressContainer.onclick = (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        };

        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        audio.onended = () => {
            document.getElementById('next-btn').click();
        };

        // Keyboard support
        document.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                e.preventDefault();
                document.getElementById('play-pause-btn').click();
            }
        });
    </script>
</body>
</html>
