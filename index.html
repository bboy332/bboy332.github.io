<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Pillowcase Playlist (1297 Songs)</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        h1 { text-align: center; margin-bottom: 4px; }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 25px; }

        .player {
            max-width: 720px;
            margin: 0 auto 30px;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        .now-playing {
            text-align: center;
        }
        .track-title {
            font-size: 1.35em;
            font-weight: 600;
            margin: 10px 0 15px;
        }
        .progress-container {
            height: 6px;
            background: #333;
            border-radius: 999px;
            margin: 15px 0;
            cursor: pointer;
            position: relative;
        }
        .progress {
            height: 100%;
            background: #00ff9d;
            width: 0%;
            border-radius: 999px;
        }
        .time {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            color: #888;
            margin-top: 4px;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        button {
            background: none;
            border: none;
            color: #fff;
            font-size: 2em;
            cursor: pointer;
            padding: 10px;
            transition: all 0.2s;
        }
        button:hover { color: #00ff9d; transform: scale(1.15); }
        .shuffle-btn {
            font-size: 1.5em;
            padding: 10px 20px;
            border-radius: 30px;
            background: #222;
        }
        .shuffle-btn.active { background: #00ff9d; color: #000; }

        .search {
            width: 100%;
            max-width: 720px;
            margin: 0 auto 25px;
            padding: 16px 20px;
            font-size: 17px;
            background: #1f1f1f;
            border: none;
            border-radius: 12px;
            color: #fff;
            display: block;
        }

        .playlist {
            max-width: 720px;
            margin: 0 auto;
        }
        .song-btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            margin: 6px 0;
            background: #1f1f1f;
            border: none;
            border-radius: 12px;
            text-align: left;
            color: #ddd;
            font-size: 15.5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .song-btn:hover {
            background: #2a2a2a;
            transform: translateX(6px);
        }
        .song-btn.playing {
            background: #00ff9d;
            color: #000;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <h1>My Pillowcase Playlist</h1>
    <div class="subtitle">1297 songs • Random start</div>

    <div class="player">
        <div class="now-playing">
            <div class="track-title" id="current-title">Loading...</div>
            <div class="progress-container" id="progress-container">
                <div class="progress" id="progress"></div>
            </div>
            <div class="time">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button id="shuffle-btn" class="shuffle-btn">🔀 Shuffle</button>
            <button id="prev-btn">⫻</button>
            <button id="play-pause-btn">▶</button>
            <button id="next-btn">⫻</button>
        </div>

        <div style="text-align:center; margin-top:10px;">
            <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8" style="width:220px;">
        </div>
    </div>

    <input type="text" id="search" class="search" placeholder="Search songs..." onkeyup="filterSongs()">

    <div class="playlist" id="playlist"></div>

    <script>
        let songs = [];
        let currentIndex = 0;
        let audio = new Audio();
        let filteredSongs = [];

        fetch('tracks.txt')
            .then(res => res.text())
            .then(text => {
                songs = text.trim().split('\n').filter(url => url.trim().startsWith('http'));
                filteredSongs = [...songs];
                currentIndex = Math.floor(Math.random() * songs.length);
                renderPlaylist();
                playCurrent();
            });

        function formatTitle(index) {
            return `Track ${String(index + 1).padStart(4, '0')}`;
        }

        function playCurrent() {
            audio.src = songs[currentIndex];
            audio.play().catch(() => {});
            document.getElementById('play-pause-btn').innerHTML = '❚❚';
            document.getElementById('current-title').textContent = formatTitle(currentIndex);
            renderPlaylist();
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist');
            container.innerHTML = '';
            filteredSongs.forEach((url, i) => {
                const globalIndex = songs.indexOf(url);
                const btn = document.createElement('button');
                btn.className = 'song-btn';
                if (globalIndex === currentIndex) btn.classList.add('playing');
                btn.textContent = `▶ ${formatTitle(globalIndex)}`;
                btn.onclick = () => {
                    currentIndex = globalIndex;
                    playCurrent();
                };
                container.appendChild(btn);
            });
        }

        function filterSongs() {
            const term = document.getElementById('search').value.toLowerCase();
            filteredSongs = songs.filter((_, i) => formatTitle(i).toLowerCase().includes(term));
            renderPlaylist();
        }

        // Controls
        document.getElementById('play-pause-btn').onclick = () => {
            if (audio.paused) {
                audio.play();
                document.getElementById('play-pause-btn').innerHTML = '❚❚';
            } else {
                audio.pause();
                document.getElementById('play-pause-btn').innerHTML = '▶';
            }
        };

        document.getElementById('next-btn').onclick = () => {
            currentIndex = (currentIndex + 1) % songs.length;
            playCurrent();
        };

        document.getElementById('prev-btn').onclick = () => {
            currentIndex = (currentIndex - 1 + songs.length) % songs.length;
            playCurrent();
        };

        document.getElementById('shuffle-btn').onclick = () => {
            const btn = document.getElementById('shuffle-btn');
            btn.classList.toggle('active');
        };

        document.getElementById('volume').oninput = (e) => audio.volume = e.target.value;

        // Progress
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress');

        audio.ontimeupdate = () => {
            if (audio.duration) {
                progressBar.style.width = (audio.currentTime / audio.duration * 100) + '%';
                document.getElementById('current-time').textContent = formatTime(audio.currentTime);
                document.getElementById('duration').textContent = formatTime(audio.duration);
            }
        };

        progressContainer.onclick = (e) => {
            const rect = progressContainer.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        };

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        audio.onended = () => document.getElementById('next-btn').click();
    </script>
</body>
</html>
