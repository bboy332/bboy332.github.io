<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pillowcase Music Player</title>
    <style>
        body { font-family: Arial, sans-serif; background: #111; color: #fff; padding: 20px; text-align: center; }
        button { padding: 12px 24px; margin: 8px; font-size: 17px; cursor: pointer; border-radius: 8px; }
        .now-playing { margin: 30px; font-size: 20px; min-height: 30px; }
        #status { color: #ff0; }
    </style>
</head>
<body>
    <h1>My Pillowcase Playlist</h1>
    <div id="nowPlaying" class="now-playing">Ready — click a song</div>
    <div id="status"></div>

    <button onclick="playSong('https://pillows.su/f/9281f17a3b740f3843fefdd75ec1d554', 'Lambo - Akachi Ruff')">
        ▶ Lambo (Akachi) Ruff
    </button>

    <!-- Add more buttons from your spreadsheet here -->

    <script>
        let currentAudio = null;

        function playSong(url, title) {
            if (currentAudio) currentAudio.pause();

            document.getElementById('nowPlaying').textContent = `Now Playing: ${title}`;
            document.getElementById('status').textContent = 'Loading...';

            // Method 1: Direct (most likely to fail due to CORS)
            currentAudio = new Audio(url);
            currentAudio.play()
                .then(() => {
                    document.getElementById('status').textContent = '✅ Playing (direct)';
                })
                .catch(() => {
                    // Method 2: CORS Proxy fallback
                    const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
                    currentAudio = new Audio(proxyUrl);
                    currentAudio.play()
                        .then(() => document.getElementById('status').textContent = '✅ Playing via proxy')
                        .catch(() => {
                            // Method 3: Open in new tab as last resort
                            document.getElementById('status').innerHTML = `⚠️ Could not stream.<br><a href="${url}" target="_blank">Click here to play in new tab</a>`;
                        });
                });
        }
    </script>
</body>
</html>
