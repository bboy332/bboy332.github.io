let tracks = rawTracks.trim().split("\n");
let filteredTracks = [...tracks];
let currentTrack = 0;
let shuffle = false;

// Favorites system
let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
let favoritesOnly = false;

const player = document.getElementById("player");

function saveFavorites() {
    localStorage.setItem("favorites", JSON.stringify(favorites));
}

function toggleFavorite() {
    let current = filteredTracks[currentTrack];

    if (favorites.includes(current)) {
        favorites = favorites.filter(t => t !== current);
    } else {
        favorites.push(current);
    }

    saveFavorites();
    updateTrackInfo();
}

function toggleFavoritesOnly() {
    favoritesOnly = !favoritesOnly;

    if (favoritesOnly) {
        filteredTracks = tracks.filter(t => favorites.includes(t));
    } else {
        filteredTracks = [...tracks];
    }

    currentTrack = 0;
    loadTrack();

    document.querySelectorAll("button")[4].innerText =
        "Show Favorites Only: " + (favoritesOnly ? "ON" : "OFF");
}

function loadTrack() {
    if (filteredTracks.length === 0) {
        document.getElementById("trackInfo").innerText = "No tracks available";
        return;
    }

    let track = filteredTracks[currentTrack];
    player.src = track;
    player.play().catch(() => {});
    updateTrackInfo();
}

function nextTrack() {
    if (shuffle) {
        currentTrack = Math.floor(Math.random() * filteredTracks.length);
    } else {
        currentTrack = (currentTrack + 1) % filteredTracks.length;
    }
    loadTrack();
}

function prevTrack() {
    currentTrack = (currentTrack - 1 + filteredTracks.length) % filteredTracks.length;
    loadTrack();
}

function toggleShuffle() {
    shuffle = !shuffle;
    document.querySelectorAll("button")[2].innerText =
        "Shuffle: " + (shuffle ? "ON" : "OFF");
}

function updateTrackInfo() {
    let track = filteredTracks[currentTrack];
    let isFav = favorites.includes(track);

    document.getElementById("trackInfo").innerText =
        (isFav ? "⭐ " : "") + track;
}

// Auto next
player.addEventListener("ended", nextTrack);

// Init
loadTrack();
