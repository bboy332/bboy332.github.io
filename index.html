<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Pillowcase Playlist</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: #0a0a0a; color: #fff;
            padding: 20px;
            line-height: 1.4;
        }
        .header { text-align:center; margin-bottom:20px; }
        h1 { font-size:28px; }
        .count { color:#aaa; font-size:15px; }

        .player {
            background:#1a1a1a; border-radius:16px; padding:20px;
            max-width:720px; margin:0 auto 30px; box-shadow:0 10px 30px rgba(0,0,0,0.5);
        }
        .now-playing { font-size:18px; font-weight:600; margin-bottom:12px; }
        .progress-container {
            height:6px; background:#333; border-radius:999px; margin:15px 0; cursor:pointer;
        }
        .progress { height:100%; background:#1db954; border-radius:999px; width:0%; }
        .controls {
            display:flex; justify-content:center; gap:25px; margin-top:15px;
        }
        button { background:none; border:none; color:white; font-size:28px; cursor:pointer; }
        .play-pause { font-size:42px; background:#1db954; color:#000; width:64px; height:64px; border-radius:50%; display:flex; align-items:center; justify-content:center; }

        .song-btn {
            width:100%; max-width:720px; margin:6px auto; display:block;
            padding:16px 20px; background:#1a1a1a; border:none; border-radius:12px;
            color:white; text-align:left; cursor:pointer; font-size:16px;
        }
        .song-btn:hover { background:#252525; }
        .song-btn.playing { background:#1db954; color:#000; }
    </style>
</head>
<body>
    <div class="header">
        <h1>My Pillowcase Playlist</h1>
        <div class="count" id="count">Loading songs...</div>
    </div>

    <div class="player">
        <div class="now-playing" id="now-title">—</div>
        <div class="progress-container" id="progress-container"><div class="progress" id="progress"></div></div>
        <div class="controls">
            <button id="shuffle-btn">🔀</button>
            <button id="prev-btn">⏮</button>
            <button class="play-pause" id="play-pause-btn">▶</button>
            <button id="next-btn">⏭</button>
            <button id="mode-btn">All</button>
        </div>
    </div>

    <input type="text" id="search" style="width:100%; max-width:720px; margin:0 auto 20px; display:block; padding:16px 20px; background:#1a1a1a; border:none; border-radius:999px; color:white; font-size:17px;" placeholder="Search songs..." onkeyup="filterSongs()">

    <div id="playlist"></div>
    <audio id="audio"></audio>

    <script>
        let songs = [];
        let currentIndex = -1;
        let isShuffle = true;
        let audio = document.getElementById('audio');

        fetch('tracks.txt')
            .then(res => {
                if (!res.ok) return fetch('tracks'); // try without .txt
                return res;
            })
            .then(res => res.text())
            .then(text => {
                const links = text.trim().split('\n').filter(line => line.trim().startsWith('http'));
                songs = links.map((url, i) => ({
                    title: `Track ${String(i+1).padStart(4, '0')}`,
                    url: url.trim()
                }));
                
                document.getElementById('count').textContent = `${songs.length} songs • Random start enabled`;
                initPlayer();
            })
            .catch(err => {
                document.getElementById('count').innerHTML = 'Error: Make sure <b>tracks.txt</b> is in the same folder';
                console.error(err);
            });

        function initPlayer() {
            if (songs.length === 0) return;
            currentIndex = Math.floor(Math.random() * songs.length);
            playSong(currentIndex);
        }

        function playSong(index) {
            if (index < 0 || index >= songs.length) return;
            currentIndex = index;
            const song = songs[index];
            audio.src = song.url;
            document.getElementById('now-title').textContent = song.title;
            audio.play().catch(() => {});
            document.getElementById('play-pause-btn').innerHTML = '❚❚';
            renderPlaylist();
        }

        function nextSong() {
            if (isShuffle) {
                currentIndex = Math.floor(Math.random() * songs.length);
            } else {
                currentIndex = (currentIndex + 1) % songs.length;
            }
            playSong(currentIndex);
        }

        function renderPlaylist(filtered = songs) {
            const container = document.getElementById('playlist');
            container.innerHTML = '';
            filtered.forEach((song, globalIndex) => {
                const btn = document.createElement('button');
                btn.className = `song-btn ${globalIndex === currentIndex ? 'playing' : ''}`;
                btn.innerHTML = `▶ ${song.title}`;
                btn.onclick = () => playSong(globalIndex);
                container.appendChild(btn);
            });
        }

        function filterSongs() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = songs.filter(s => s.title.toLowerCase().includes(term));
            renderPlaylist(filtered);
        }

        // Controls
        document.getElementById('play-pause-btn').onclick = () => {
            audio.paused ? audio.play() : audio.pause();
            document.getElementById('play-pause-btn').innerHTML = audio.paused ? '▶' : '❚❚';
        };
        document.getElementById('next-btn').onclick = nextSong;
        document.getElementById('prev-btn').onclick = () => {
            currentIndex = (currentIndex - 1 + songs.length) % songs.length;
            playSong(currentIndex);
        };
        document.getElementById('shuffle-btn').onclick = () => isShuffle = !isShuffle;
        audio.onended = nextSong;

        window.onload = () => {};
    </script>
</body>
</html>
