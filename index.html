<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Pillowcase Playlist (Lil Uzi Vert)</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #0a0a0a; 
            color: #fff; 
            margin: 0; 
            padding: 20px; 
            text-align: center;
        }
        h1 { margin: 10px 0 5px; }
        .subtitle { color: #aaa; margin-bottom: 20px; }
        #player {
            max-width: 720px;
            margin: 20px auto;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
        }
        #now-playing {
            background: #222;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            min-height: 80px;
            text-align: left;
        }
        #current-title a {
            color: #bb86fc;
            text-decoration: underline;
        }
        button {
            padding: 12px 20px;
            margin: 5px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background: #555; }
        #shuffle-btn.active {
            background: #bb86fc;
            color: black;
        }
        .song-btn {
            display: block;
            width: 100%;
            max-width: 720px;
            margin: 6px auto;
            padding: 14px;
            background: #1f1f1f;
            color: #fff;
            border: none;
            border-radius: 10px;
            text-align: left;
            cursor: pointer;
        }
        .song-btn:hover { background: #333; }
        .song-btn.playing { background: #4a2b8a; }
        .heart { float: right; font-size: 18px; cursor: pointer; }
        .heart.liked { color: #ff4d94; }
    </style>
</head>
<body>
    <h1>My Pillowcase Playlist</h1>
    <div class="subtitle">Lil Uzi Vert Tracker • Static TSV</div>

    <div id="player">
        <div id="now-playing">
            <strong>Now Playing:</strong> 
            <span id="current-title">Loading...</span><br>
            <span id="current-notes" style="font-size:0.9em; color:#bbb;"></span>
        </div>

        <div>
            <button id="shuffle-btn">🔀 Shuffle</button>
            <button id="prev-btn">⏮️</button>
            <button id="play-pause-btn">▶️</button>
            <button id="next-btn">⏭️</button>
        </div>

        <input type="range" id="progress" style="width:100%; margin:15px 0;" value="0">
        <div style="display:flex; justify-content:space-between; font-size:0.9em;">
            <span id="current-time">0:00</span>
            <span id="duration">0:00</span>
        </div>

        <div style="margin-top:15px;">
            <label>Volume: </label>
            <input type="range" id="volume" min="0" max="1" step="0.01" value="1" style="width:200px;">
        </div>
    </div>

    <input type="text" id="search" placeholder="Search songs..." style="width:90%; max-width:600px; padding:12px; margin:15px auto; display:block; border-radius:8px; border:none; font-size:16px;">

    <div id="playlist"></div>

    <script>
        let songs = [];
        let currentIndex = -1;
        let isShuffle = false;
        let audio = new Audio();
        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];

        const csvUrl = "tracker.tsv";

        fetch(csvUrl)
            .then(res => res.text())
            .then(text => {
                const lines = text.trim().split('\n');
                songs = [];
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split('\t');
                    if (cols.length < 5) continue;

                    let rawLink = cols[cols.length - 1] || "";
                    let pillowLink = rawLink; // original pillowcase link for hyperlink
                    if (rawLink.includes('pillows.su/f/')) {
                        const hash = rawLink.split('/f/')[1].split('?')[0];
                        rawLink = `https://api.pillows.su/api/get/${hash}`;
                    }

                    if (rawLink.startsWith('http')) {
                        songs.push({
                            name: cols[1] || "Untitled",
                            notes: cols[2] || "",
                            length: cols[3] || "",
                            era: cols[0] || "",
                            link: rawLink,
                            pillowLink: pillowLink || rawLink
                        });
                    }
                }

                renderPlaylist(songs);
                playRandomSong();
            })
            .catch(err => console.error(err));

        function playRandomSong() {
            if (songs.length === 0) return;
            currentIndex = Math.floor(Math.random() * songs.length);
            playCurrent();
        }

        function playCurrent() {
            if (currentIndex < 0 || currentIndex >= songs.length) return;
            const song = songs[currentIndex];
            audio.src = song.link;
            audio.play().catch(() => {});

            const titleEl = document.getElementById('current-title');
            titleEl.innerHTML = `<a href="${song.pillowLink}" target="_blank">${song.name}</a>`;

            document.getElementById('current-notes').innerHTML = 
                `<strong>Era:</strong> ${song.era}<br><strong>Notes:</strong> ${song.notes}`;

            renderPlaylist(songs);
        }

        function renderPlaylist(filtered) {
            const container = document.getElementById('playlist');
            container.innerHTML = '';
            filtered.forEach((song, globalIdx) => {
                const btn = document.createElement('button');
                btn.className = 'song-btn';
                if (globalIdx === currentIndex) btn.classList.add('playing');
                
                btn.innerHTML = `
                    ▶ ${song.name}
                    <span class="heart ${favorites.includes(globalIdx) ? 'liked' : ''}" 
                          onclick="event.stopImmediatePropagation(); toggleFavorite(${globalIdx})">❤️</span>
                `;
                btn.onclick = () => {
                    currentIndex = songs.indexOf(song);
                    playCurrent();
                };
                container.appendChild(btn);
            });
        }

        function toggleFavorite(idx) {
            if (favorites.includes(idx)) {
                favorites = favorites.filter(i => i !== idx);
            } else {
                favorites.push(idx);
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
            renderPlaylist(songs);
        }

        // Controls
        document.getElementById('play-pause-btn').onclick = () => {
            audio.paused ? audio.play() : audio.pause();
        };
        document.getElementById('next-btn').onclick = () => {
            currentIndex = isShuffle 
                ? Math.floor(Math.random() * songs.length) 
                : (currentIndex + 1) % songs.length;
            playCurrent();
        };
        document.getElementById('prev-btn').onclick = () => {
            currentIndex = isShuffle 
                ? Math.floor(Math.random() * songs.length) 
                : (currentIndex - 1 + songs.length) % songs.length;
            playCurrent();
        };

        const shuffleBtn = document.getElementById('shuffle-btn');
        shuffleBtn.onclick = () => {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('active', isShuffle);
        };

        // Volume
        const volumeSlider = document.getElementById('volume');
        volumeSlider.oninput = () => audio.volume = volumeSlider.value;

        // Progress
        audio.ontimeupdate = () => {
            const progress = document.getElementById('progress');
            if (audio.duration) progress.value = (audio.currentTime / audio.duration) * 100;
            document.getElementById('current-time').textContent = formatTime(audio.currentTime);
        };
        document.getElementById('progress').oninput = (e) => {
            audio.currentTime = (e.target.value / 100) * audio.duration;
        };
        audio.onloadedmetadata = () => {
            document.getElementById('duration').textContent = formatTime(audio.duration);
        };
        audio.onended = () => document.getElementById('next-btn').click();

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // Search
        document.getElementById('search').onkeyup = function() {
            const term = this.value.toLowerCase();
            const filtered = songs.filter(s => s.name.toLowerCase().includes(term));
            renderPlaylist(filtered);
        };
    </script>
</body>
</html>
