// Clean and convert each link to direct /file MP3
let tracks = rawTracks
.split("\n")
.map(t => t.trim())
.filter(t => t.length > 0)
.map(t => t.replace(/"/g, ""))          // remove quotes if any
.map(t => t.replace("http://", "https://")) // ensure HTTPS
.map(t => t.replace(/\/play$/, ""))     // remove /play if present
.map(t => t.replace(/\/file$/, ""))     // remove /file if present
.map(t => t + "/file");                 // add /file to get direct MP3

let current = 0;
let shuffle = false;

const player = document.getElementById("player");
const info = document.getElementById("trackInfo");

// Play a specific track
function playTrack(index) {
    if (tracks.length === 0) {
        info.textContent = "No tracks detected.";
        return;
    }

    if (index >= tracks.length) current = 0; // loop playlist
    if (index < 0) current = tracks.length - 1;

    current = index;
    player.src = tracks[current];
    player.play().catch(e => console.log("Autoplay blocked. Click play.", e));
    info.textContent = `Track ${current + 1} / ${tracks.length}`;
}

// Next track
function nextTrack() {
    if (shuffle) {
        current = Math.floor(Math.random() * tracks.length);
    } else {
        current++;
        if (current >= tracks.length) current = 0; // loop
    }
    playTrack(current);
}

// Previous track
function prevTrack() {
    if (shuffle) {
        current = Math.floor(Math.random() * tracks.length);
    } else {
        current--;
        if (current < 0) current = tracks.length - 1; // loop
    }
    playTrack(current);
}

// Toggle shuffle
function toggleShuffle() {
    shuffle = !shuffle;
    document.querySelector("button:nth-of-type(3)").textContent =
        shuffle ? "Shuffle: ON" : "Shuffle: OFF";
}

// Auto advance when track ends
player.addEventListener("ended", nextTrack);

// Start first track
playTrack(0);

</script>
